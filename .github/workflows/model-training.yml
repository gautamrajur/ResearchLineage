name: Model Training

on:
  pull_request:          # TEMPORARY — remove after merge
    branches: [main]
  workflow_dispatch:
    inputs:
      model_version:
        description: 'Model version tag (auto-generated if empty)'
        required: false
        default: ''
      min_new_samples:
        description: 'Minimum new samples to trigger training'
        required: false
        default: '50'
      skip_eval:
        description: 'Skip evaluation after training'
        required: false
        type: boolean
        default: false

jobs:
  train:
    runs-on: ubuntu-latest
    outputs:
      model_version: ${{ steps.train.outputs.model_version }}
      model_gcs_uri: ${{ steps.train.outputs.model_gcs_uri }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modal CLI
        if: github.event_name != 'pull_request'
        run: pip install modal

      - name: Configure Modal
        if: github.event_name != 'pull_request'
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: Run training on Modal
        id: train
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          VERSION="${{ inputs.model_version }}"
          if [ -z "$VERSION" ]; then
            VERSION="v$(date +%Y%m%d_%H%M%S)"
          fi
          echo "model_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "model_gcs_uri=gs://${{ secrets.GCS_BUCKET_NAME }}/models/trained/$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "VALIDATION MODE: Skipping actual Modal training."
            echo "Would train model version: $VERSION"
          else
            echo "Training model version: $VERSION"
            modal run scripts/modal_train.py
          fi

  log-mlflow:
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install mlflow google-cloud-storage pydantic pydantic-settings python-dotenv

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python -c "
          import os, sys

          tracking_uri = os.environ.get('MLFLOW_TRACKING_URI', '')
          if not tracking_uri:
              print('MLFLOW_TRACKING_URI not set — skipping MLflow logging (validation mode)')
              sys.exit(0)

          from src.mlflow_utils import log_training_run, register_model
          params = {
              'base_model': 'unsloth/Qwen2.5-7B-Instruct',
              'lora_r': 16, 'lora_alpha': 16, 'lora_dropout': 0.0,
              'epochs': 3, 'learning_rate': 2e-4,
              'max_seq_length': 102400,
          }
          run_id = log_training_run(
              params=params, metrics={},
              model_uri='${{ needs.train.outputs.model_gcs_uri }}',
              tags={'model_version': '${{ needs.train.outputs.model_version }}'},
          )
          register_model(run_id=run_id, model_uri='${{ needs.train.outputs.model_gcs_uri }}')
          print(f'MLflow run: {run_id}')
          "

  evaluate:
    needs: train
    if: ${{ github.event_name == 'pull_request' || !inputs.skip_eval }}
    uses: ./.github/workflows/model-comparison.yml
    secrets: inherit

  register:
    needs: [train, log-mlflow]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-storage pydantic pydantic-settings python-dotenv

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Register model in artifact registry
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "VALIDATION MODE: Skipping registry push."
            echo "Would register: ${{ needs.train.outputs.model_gcs_uri }}"
          else
            python -c "
          from src.registry.artifact_registry import push_model_to_registry
          result = push_model_to_registry(
              model_gcs_uri='${{ needs.train.outputs.model_gcs_uri }}',
              version='${{ needs.train.outputs.model_version }}',
              metadata={'training_trigger': 'github_actions'},
          )
          print(f'Registered: {result}')
          "
          fi

  notify:
    needs: [train, log-mlflow, register]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pydantic-settings python-dotenv
      - name: Send training notification
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          if [ "${{ needs.train.result }}" = "failure" ]; then
            STATUS="failure"
            EVENT="Training Failed"
            DETAILS="Model version: ${{ needs.train.outputs.model_version }} | Train: ${{ needs.train.result }} | MLflow: ${{ needs.log-mlflow.result }} | Register: ${{ needs.register.result }}"
          else
            STATUS="success"
            EVENT="Training Complete"
            DETAILS="Model version: ${{ needs.train.outputs.model_version }} | GCS: ${{ needs.train.outputs.model_gcs_uri }} | All steps passed"
          fi
          python scripts/notify.py \
            --channel email \
            --event "$EVENT" \
            --status "$STATUS" \
            --details "$DETAILS | Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
