services:
  postgres:
    image: postgres:15
    container_name: airflow_metadata_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.21.1
    container_name: cloud_sql_proxy
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "researchlineage:us-central1:researchlineage-db"
    ports:
      - "5432:5432"
    volumes:
      - ${GCLOUD_CONFIG_DIR}:/gcp/config:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/config/application_default_credentials.json
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: research_lineage_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow_init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - _PIP_ADDITIONAL_REQUIREMENTS=google-genai beautifulsoup4 pydantic-settings
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow_webserver
    environment:
      # Airflow Core Settings
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__PARALLELISM=32
      - AIRFLOW__CORE__DAG_CONCURRENCY=16
      - AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=16
      - PYTHONPATH=/opt/airflow
      - _PIP_ADDITIONAL_REQUIREMENTS=google-genai beautifulsoup4 pydantic-settings
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/config/application_default_credentials.json
      # GCP Settings
      - GOOGLE_CLOUD_PROJECT=researchlineage
      # MLflow
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      # Cloud SQL via Proxy (for retry_failed_pdfs DAG)
      - CLOUD_SQL_HOST=${CLOUD_SQL_HOST}
      - CLOUD_SQL_PORT=${CLOUD_SQL_PORT}
      - CLOUD_SQL_DB=${CLOUD_SQL_DB}
      - CLOUD_SQL_USER=${CLOUD_SQL_USER}
      - CLOUD_SQL_PASSWORD=${CLOUD_SQL_PASSWORD}
      # Structured JSON logging — Filebeat tails this file and ships to Elasticsearch
      - LOG_JSON_FILE=/opt/airflow/logs/app/researchlineage.jsonl
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      - postgres
      - redis
      - cloud-sql-proxy
      - airflow-init
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
      - ./tests:/opt/airflow/tests
      - ${GCLOUD_CONFIG_DIR}:/gcp/config:ro
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow_scheduler
    environment:
      # Airflow Core Settings
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__PARALLELISM=32
      - AIRFLOW__CORE__DAG_CONCURRENCY=16
      - AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=16
      - PYTHONPATH=/opt/airflow
      - _PIP_ADDITIONAL_REQUIREMENTS=google-genai beautifulsoup4 pydantic-settings
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/config/application_default_credentials.json
      # GCP Settings
      - GOOGLE_CLOUD_PROJECT=researchlineage
      # MLflow
      - MLFLOW_TRACKING_URI=http://mlflow:5001
      # Cloud SQL via Proxy (for retry_failed_pdfs DAG)
      - CLOUD_SQL_HOST=${CLOUD_SQL_HOST}
      - CLOUD_SQL_PORT=${CLOUD_SQL_PORT}
      - CLOUD_SQL_DB=${CLOUD_SQL_DB}
      - CLOUD_SQL_USER=${CLOUD_SQL_USER}
      - CLOUD_SQL_PASSWORD=${CLOUD_SQL_PASSWORD}
      # Structured JSON logging — Filebeat tails this file and ships to Elasticsearch
      - LOG_JSON_FILE=/opt/airflow/logs/app/researchlineage.jsonl
    env_file:
      - .env
    command: scheduler
    depends_on:
      - postgres
      - redis
      - cloud-sql-proxy
      - airflow-init
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
      - ./tests:/opt/airflow/tests
      - ${GCLOUD_CONFIG_DIR}:/gcp/config:ro
    restart: unless-stopped

  mlflow-db:
    image: postgres:15
    container_name: mlflow_metadata_db
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5434:5432"
    volumes:
      - mlflow_metadata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: mlflow_server
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/config/application_default_credentials.json
    entrypoint: ["sh", "-c"]
    command:
      - |
        pip install --quiet psycopg2-binary google-cloud-storage &&
        mlflow server \
          --backend-store-uri postgresql+psycopg2://mlflow:mlflow@mlflow-db:5432/mlflow \
          --default-artifact-root gs://researchlineage-gcs/mlflow-artifacts \
          --host 0.0.0.0 \
          --port 5001
    ports:
      - "5001:5001"
    volumes:
      - ${GCLOUD_CONFIG_DIR}:/gcp/config:ro
    depends_on:
      mlflow-db:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ELK Stack — Elasticsearch + Kibana + Filebeat
  #
  # Architecture:
  #   Python app writes JSON logs to logs/app/researchlineage.jsonl
  #   Filebeat tails that file and ships each line to Elasticsearch
  #   Kibana reads from Elasticsearch and displays the dashboard
  #
  # Security is disabled (xpack.security.enabled=false) for local dev.
  # Ports:
  #   Elasticsearch: http://localhost:9200
  #   Kibana:        http://localhost:5601
  # ---------------------------------------------------------------------------

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: researchlineage_elasticsearch
    environment:
      # Single-node mode — no cluster coordination overhead in dev.
      - discovery.type=single-node
      # Disable security so we don't need TLS certs or passwords locally.
      # Re-enable for production: set xpack.security.enabled=true and configure certs.
      - xpack.security.enabled=false
      # Limit JVM heap to 512MB — enough for dev, prevents OOM on laptops.
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: researchlineage_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # Suppress the "Welcome to Elastic" setup wizard on first launch.
      - TELEMETRY_ENABLED=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"overall\":{\"level\":\"available\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: researchlineage_filebeat
    # Run as root so Filebeat can read the log file regardless of who created it.
    user: root
    volumes:
      # Config file (read-only so Filebeat doesn't corrupt it).
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # The log directory — Filebeat reads, app containers write.
      - ./logs:/logs:ro
    # --strict.perms=false disables the ownership check Filebeat does on its
    # config file — needed because the file is owned by the host user, not
    # the filebeat container user.
    command: filebeat -e --strict.perms=false
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    restart: unless-stopped

volumes:
  airflow_metadata:
  mlflow_metadata:
  elasticsearch_data:
