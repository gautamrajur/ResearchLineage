services:
  postgres:
    image: postgres:15
    container_name: airflow_metadata_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.21.1
    container_name: cloud_sql_proxy
    command:
      - "--address=0.0.0.0"
      - "--port=5432"
      - "researchlineage:us-central1:researchlineage-db"
    ports:
      - "5432:5432"
    volumes:
      - ${GCLOUD_CONFIG_DIR}:/gcp/config:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/config/application_default_credentials.json
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: research_lineage_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow_init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - _PIP_ADDITIONAL_REQUIREMENTS=google-genai beautifulsoup4 pydantic-settings
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/config/application_default_credentials.json
      - GOOGLE_CLOUD_PROJECT=mlops-researchlineage
      - MODAL_TOKEN_ID=${MODAL_TOKEN_ID}
      - MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init

        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true

        airflow connections delete google_cloud_default || true
        airflow connections add google_cloud_default \
          --conn-type google_cloud_platform \
          --conn-extra '{"project": "mlops-researchlineage", "key_path": "/opt/airflow/secrets/researchlineage-sa-key.json"}'
        airflow variables set GCP_PROJECT_ID mlops-researchlineage
        airflow variables set GCP_REGION us-central1
        airflow variables set GCR_IMAGE gcr.io/mlops-researchlineage/lineage-training
        airflow variables set MIN_NEW_SAMPLES 0
        airflow variables set GCS_BUCKET researchlineage-data-central1
        airflow variables set MAX_SEQ_LEN 102400
        airflow variables set SERVING_MAX_LEN 102400  
        airflow variables set MAX_ACCEPTABLE_LOSS 2.5
        airflow variables set MODAL_APP_NAME research-lineage-serving
        airflow variables set MODAL_TOKEN_ID your_modal_token_id
        airflow variables set MODAL_TOKEN_SECRET your_modal_token_secret

        echo "✅ Airflow init complete"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${GCLOUD_CONFIG_DIR}:/gcp/config:ro
      - ./researchlineage-sa-key.json:/opt/airflow/secrets/researchlineage-sa-key.json:ro
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow_webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW__CORE__PARALLELISM=32
      - AIRFLOW__CORE__DAG_CONCURRENCY=16
      - AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=16
      - PYTHONPATH=/opt/airflow
      - _PIP_ADDITIONAL_REQUIREMENTS=google-genai beautifulsoup4 pydantic-settings
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/secrets/researchlineage-sa-key.json
      - GOOGLE_CLOUD_PROJECT=mlops-researchlineage
      - CLOUD_SQL_HOST=${CLOUD_SQL_HOST}
      - CLOUD_SQL_PORT=${CLOUD_SQL_PORT}
      - CLOUD_SQL_DB=${CLOUD_SQL_DB}
      - CLOUD_SQL_USER=${CLOUD_SQL_USER}
      - CLOUD_SQL_PASSWORD=${CLOUD_SQL_PASSWORD}
      - MODAL_TOKEN_ID=${MODAL_TOKEN_ID}
      - MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      - postgres
      - redis
      - cloud-sql-proxy
      - airflow-init
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
      - ./tests:/opt/airflow/tests
      - ${GCLOUD_CONFIG_DIR}:/gcp/config:ro
      - ./training:/opt/airflow/training
      - ./researchlineage-sa-key.json:/opt/airflow/secrets/researchlineage-sa-key.json:ro
      - ./docker:/opt/airflow/docker:ro
      - ./scripts:/opt/airflow/scripts:ro
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    container_name: airflow_scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__PARALLELISM=32
      - AIRFLOW__CORE__DAG_CONCURRENCY=16
      - AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG=16
      - PYTHONPATH=/opt/airflow
      - _PIP_ADDITIONAL_REQUIREMENTS=google-genai beautifulsoup4 pydantic-settings
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/secrets/researchlineage-sa-key.json
      - GOOGLE_CLOUD_PROJECT=mlops-researchlineage
      - CLOUD_SQL_HOST=${CLOUD_SQL_HOST}
      - CLOUD_SQL_PORT=${CLOUD_SQL_PORT}
      - CLOUD_SQL_DB=${CLOUD_SQL_DB}
      - CLOUD_SQL_USER=${CLOUD_SQL_USER}
      - CLOUD_SQL_PASSWORD=${CLOUD_SQL_PASSWORD}
      - MODAL_TOKEN_ID=${MODAL_TOKEN_ID}
      - MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}
    env_file:
      - .env
    command: scheduler
    depends_on:
      - postgres
      - redis
      - cloud-sql-proxy
      - airflow-init
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./logs:/opt/airflow/logs
      - ./tests:/opt/airflow/tests
      - ${GCLOUD_CONFIG_DIR}:/gcp/config:ro
      - ./training:/opt/airflow/training
      - ./researchlineage-sa-key.json:/opt/airflow/secrets/researchlineage-sa-key.json:ro
      - ./docker:/opt/airflow/docker:ro
      - ./scripts:/opt/airflow/scripts:ro
    restart: unless-stopped