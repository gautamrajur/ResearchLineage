# filebeat/filebeat.yml
# ---------------------
# Filebeat watches the structured JSON log file written by src/utils/logging.py
# and ships each line to Elasticsearch.  Kibana then visualises the data.
#
# How the chain works:
#   Python app  →  LOG_JSON_FILE (NDJSON)  →  Filebeat  →  Elasticsearch  →  Kibana

filebeat.inputs:
  - type: filestream
    id: researchlineage-app-logs
    enabled: true
    paths:
      - /logs/app/researchlineage.jsonl
    # Each line is already a complete JSON object from _JsonFormatter.
    # parsers.ndjson lifts the JSON fields to the top level of the event
    # so Elasticsearch indexes them as proper fields (level, logger, dag_id, etc.)
    # instead of burying them under a single "message" string.
    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true
    tags: ["researchlineage", "python"]

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  # One index per day — keeps queries fast and makes retention simple.
  index: "researchlineage-logs-%{+yyyy.MM.dd}"

setup.kibana:
  host: "kibana:5601"

# Disable automatic template and ILM setup.
# Filebeat 8.x defaults to data streams which conflict with custom index names.
# With both disabled, Elasticsearch uses dynamic mapping — fine for dev.
setup.template.enabled: false
setup.ilm.enabled: false

filebeat.registry.flush: 500ms

logging.level: info
logging.to_files: false
